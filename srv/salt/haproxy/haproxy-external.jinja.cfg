global
    log /dev/log    local0
    #log /dev/log   local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin-external.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private
{% if load_dhparams is defined %}
    ssl-dh-param-file /etc/haproxy/dhparams.pem
{% endif %}

    # Default ciphers to use on SSL-enabled listening sockets.
    # For more information, see ciphers(1SSL). This list is from:
    #  https://mozilla.github.io/server-side-tls/ssl-config-generator/?server=haproxy-1.7.9&openssl=1.1.0f&hsts=yes&profile=modern
    # set default parameters to the modern configuration
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets
    ssl-default-server-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256
    ssl-default-server-options no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

defaults
    log	global
    mode	http
    option	httplog
    option	dontlognull
    timeout connect 30000
    timeout client  50000
    timeout server  50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

{%- set http_services = services.group_by_tagvalue("smartstack:protocol:")["http"] if "http" in
                            services.group_by_tagvalue("smartstack:protocol:") else services.empty() -%}
{%- set tcp_services = services.group_by_tagvalue("smartstack:protocol:")["tcp"] if "tcp" in
                            services.group_by_tagvalue("smartstack:protocol:") else services.empty() -%}
{%- set sni_services = services.group_by_tagvalue("smartstack:protocol:")["sni"] if "sni" in
                            services.group_by_tagvalue("smartstack:protocol:") else services.empty() -%}
{%- set https_services = services.group_by_tagvalue("smartstack:protocol:")["https"] if "https" in
                            services.group_by_tagvalue("smartstack:protocol:") else services.empty() -%}
{%- set http3_services = services.group_by_tagvalue("smartstack:protocol:")["http3"] if "http3" in
                            services.group_by_tagvalue("smartstack:protocol:") else services.empty() -%}
{%- set all_ssl_services = https_services + sni_services -%}
{%- set use_sni_dispatch = sni_services.count() > 0 -%}
{%- set ssl_crt_path = certfolder if certfolder is defined else maincert if maincert is defined else none -%}

{%- macro acl_token(value) -%}
{{- value|replace('.', '_')|replace('-', '_')|replace('/', '_')|replace(':', '_')|replace('*', 'wildcard') -}}
{%- endmacro %}

{#- first let's handle all port 80 http services. We also redirect SSL services to HTTPS, if
    they have the right tags -#}
{% if http_services.count() > 0 or ("https-redirect" in all_ssl_services.tagvalue_set("smartstack:")) %}
frontend http-routing
    {% for localip in localips -%}
        bind {{localip}}:80
    {% endfor %}
    http-request add-header X-Forwarded-Proto http
    {% for hostname in proxypath_domains(http_services.tagvalue_set("smartstack:proxypath:")) -%}
        acl proxypath_host_{{acl_token(hostname)}} hdr(Host) -i {{hostname}}
    {% endfor %}
    {% for route in proxypath_routes(http_services) -%}
        acl proxypath_http_{{loop.index}} path -i {{route.path}}
        acl proxypath_http_{{loop.index}} path_beg {{route.path}}/
        {% if route.strip_prefix -%}
            http-request set-path '/%[path,regsub("^.{{'{'}}{{route.strip_prefix_len}}{{'}'}}/?(.*)","\1")]' if proxypath_host_{{acl_token(route.domain)}} proxypath_http_{{loop.index}}
        {% endif -%}
        use_backend backend-http-{{route.service_name}} if proxypath_host_{{acl_token(route.domain)}} proxypath_http_{{loop.index}}
    {% endfor %}
    {% for svcname, svclist in http_services.group_by("name").items() -%}
        {% for hostname in svclist.tagvalue_set("smartstack:hostname:") -%}
            acl host_{{svcname}} hdr(Host) -i {{hostname}}
        {% endfor %}
        {% for option in svclist.tagvalue_set("haproxy:frontend:option:") -%}
            option {{option}}
        {% endfor %}
        {% for timeout in group.tagvalue_set("haproxy:frontend:timeout:") %}
            timeout {{timeout.split(':', 1)[0]}} {{timeout.split(':', 1)[1]}}
        {% endfor %}
        {% if svclist.tagvalue_set("smartstack:hostname:")|length > 0 -%}
            use_backend backend-http-{{svcname}} if host_{{svcname}}
        {% endif -%}
    {% endfor %}
    {% for svcname, svclist in all_ssl_services.group_by("name").items() -%}
        {% for hostname in svclist.tagvalue_set("smartstack:hostname:") -%}
            {% if "https-redirect" in svclist.tagvalue_set("smartstack:") -%}
                acl host_{{hostname}}_httpsredir hdr(Host) -i {{hostname}}
                redirect prefix https://{{hostname}} code 301 if host_{{hostname}}_httpsredir
            {%- endif -%}
        {% endfor %}
    {% endfor -%}
{% endif -%}


{% if tcp_services.count() > 0 %}
frontend tcp-routing
    {%- if tcp_services.tagvalue_set("smartstack:extport:")|length > 0 %}
        {%- for localip in localips %}
            {%- for ports in tcp_services.tagvalue_set("smartstack:extport:") %}
                bind {{localip}}:{{ports}}
            {%- endfor %}
        {%- endfor %}
    {%- endif %}
    mode tcp

    # This can ONLY DO PORT ROUTING!
    {%- for name, svc in tcp_services.group_by_tagvalue("smartstack:routing:")["port"].group_by("name").items() %}
        {%- for ports in svc.tagvalue_set("smartstack:extport:") %}
            {%- if '-' in ports %}
                acl host_{{name}} fc_dst_port {{ports|replace('-', ':')}}
            {%- else %}
                acl host_{{name}} fc_dst_port eq {{ports}}
            {%- endif %}
        {%- endfor %}
    {%- endfor %}
    
    {%- for name, svc in tcp_services.group_by_tagvalue("smartstack:routing:")["port"].group_by("name").items() %}
        {%- for ports in svc.tagvalue_set("smartstack:extport:") %}
            {%- if '-' in ports %}
                use_backend backend-tcp-{{name}}_{{ports}} if host_{{name}}
            {%- else %}
                use_backend backend-tcp-{{name}} if host_{{name}}
            {%- endif %}
        {%- endfor %}
    {%- endfor %}
{%- endif %}


{#- If we have SNI based services, the routing will go like this:
        ingress -> SNI routing -> local port https/http3 routing
                     |                |
                     +-> servers      +-> servers

    This routing might become a performance problem at some point since SSL termination passes
    through two frontends in this configuration. When that happens, split the loadbalancer in two,
    where one routes SNI and one routes SSL terminated connections. -#}
{% if sni_services.count() > 0 %}
frontend sni-routing
    {%- if sni_services.tagvalue_set("smartstack:extport:")|length > 0 %}
        {%- for localip in localips %}
            {%- for ports in sni_services.group_by_tagvalue("smartstack:extport:").keys() %}
                bind {{localip}}:{{ports}}
                    {%- if "ssl-terminate" in sni_services.group_by_tagvalue("smartstack:extport:")[ports].tagvalue_set("smartstack:") %} ssl
                        {%- if ssl_crt_path %} crt {{ssl_crt_path}}{% endif %}
                    {%- endif %}
            {%- endfor %}
        {%- endfor %}
    {%- endif %}
    {%- for localip in localips %}
        bind {{localip}}:443
    {%- endfor %}
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }
    mode tcp
    option tcplog

    {% for name, svc in sni_services.group_by("name").items() %}
        {%- for routetype in svc.tagvalue_set("smartstack:routing:") %}
            {%- if routetype == "hostname" %}
                {%- for hostname in svc.tagvalue_set("smartstack:hostname:") %}
                    acl host_{{name}} req.ssl_sni {{hostname}}
                {%- endfor %}
            {%- elif routetype == "port" %}
                {%- for ports in svc.tagvalue_set("smartstack:extport:") %}
                    {%- if '-' in ports %}
                        acl host_{{name}} fc_dst_port {{ports|replace('-', ':')}}
                    {%- else %}
                        acl host_{{name}} fc_dst_port eq {{ports}}
                    {%- endif %}
                {%- endfor %}
            {%- endif %}
        {%- else %}
            {%- for hostname in svc.tagvalue_set("smartstack:hostname:") %}
                acl host_{{name}} req.ssl_sni {{hostname}}
            {%- endfor %}
        {%- endfor %}
        {%- for ports in svc.tagvalue_set("smartstack:extport:") %}
            {%- if "-" in ports %}
                use_backend backend-sni-{{name}}_{{ports}} if host_{{name}}
            {%- else %}
                use_backend backend-sni-{{name}} if host_{{name}}
            {%- endif %}
        {%- else %}
            use_backend backend-sni-{{name}} if host_{{name}}
        {%- endfor %}
    {% endfor %}

    {%- if https_services.count() > 0 %}
        # dispatch to https SSL termination
        {% for name, svc in https_services.group_by("name").items() %}
            {% for hostname in svc.tagvalue_set("smartstack:hostname:") %}
                acl sslterminate_dispatch req.ssl_sni {{hostname}}
            {% endfor %}
        {% endfor %}
        {% for hostname in proxypath_domains(https_services.tagvalue_set("smartstack:proxypath:")) -%}
            acl sslterminate_dispatch req.ssl_sni {{hostname}}
        {% endfor %}
        use_backend ssl-termination-dispatch if sslterminate_dispatch
    {%- endif %}
{%- endif %}
    # if nothing matches, reject the connection. This is important to prevent hanging connections that never send data.
    tcp-request content reject if WAIT_END

{% if use_sni_dispatch %}
backend ssl-termination-dispatch
    mode tcp
    server dispatch localhost:10443 send-proxy-v2
{%- endif %}

{% if https_services.count() > 0 %}
frontend https-routing
    {%- if use_sni_dispatch %}
        bind localhost:10443 accept-proxy ssl {% if ssl_crt_path %}crt {{ssl_crt_path}}{% endif %}
    {%- else %}
        {%- for localip in localips %}
            bind {{localip}}:443 ssl {% if ssl_crt_path %}crt {{ssl_crt_path}}{% endif %}
        {%- endfor %}
    {%- endif %}
    http-request add-header X-Forwarded-Proto https
    {% for hostname in proxypath_domains(https_services.tagvalue_set("smartstack:proxypath:")) -%}
        acl proxypath_host_{{acl_token(hostname)}} hdr(Host) -i {{hostname}}
    {% endfor %}
    {% for route in proxypath_routes(https_services) -%}
        acl proxypath_https_{{loop.index}} path -i {{route.path}}
        acl proxypath_https_{{loop.index}} path_beg {{route.path}}/
        {% if route.strip_prefix -%}
            http-request set-path '/%[path,regsub("^.{{'{'}}{{route.strip_prefix_len}}{{'}'}}/?(.*)","\1")]' if proxypath_host_{{acl_token(route.domain)}} proxypath_https_{{loop.index}}
        {% endif -%}
        use_backend backend-https-{{route.service_name}} if proxypath_host_{{acl_token(route.domain)}} proxypath_https_{{loop.index}}
    {% endfor %}
    {%- for name, svc in https_services.group_by("name").items() %}
        {%- for routetype in svc.tagvalue_set("smartstack:routing:") %}
            {%- if routetype == "hostname" %}
                {%- for hostname in svc.tagvalue_set("smartstack:hostname:") %}
                    acl host_{{name}} hdr(host) -i {{hostname}}
                {%- endfor %}
            {%- elif routetype == "port" %}
                {%- for ports in svc.tagvalue_set("smartstack:extport:") %}
                    {%- if '-' in ports %}
                         acl host_{{name}} fc_dst_port {{ports|replace('-', ':')}}
                    {%- else %}
                        acl host_{{name}} fc_dst_port eq {{ports}}
                    {%- endif %}
                {%- endfor %}
            {%- endif %}
        {%- else %}
            {%- for hostname in svc.tagvalue_set("smartstack:hostname:") %}
                acl host_{{name}} hdr(host) -i {{hostname}}
            {%- endfor %}
        {%- endfor %}
        {%- for option in svc.tagvalue_set("haproxy:frontend:option:") %}
            option {{option}}
        {%- endfor %}
        {%- if svc.tagvalue_set("smartstack:hostname:")|length > 0 %}
            use_backend backend-https-{{name}} if host_{{name}}
        {%- endif %}
    {%- endfor %}
{%- endif %}

{% if http3_services.count() > 0 %}
frontend http3-routing
    {%- if http3_services.tagvalue_set("smartstack:extport:")|length > 0 %}
        {% for localip in localips %}
            {% for ports in http3_services.tagvalue_set("smartstack:extport:") %}
                {% if ':' in localip %}
                    bind quic6@{{localip}}:{{ports}} ssl {% if ssl_crt_path %}crt {{ssl_crt_path}}{% endif %}
                {% else %}
                    bind quic4@{{localip}}:{{ports}} ssl {% if ssl_crt_path %}crt {{ssl_crt_path}}{% endif %}
                {% endif %}
            {% endfor %}
        {% endfor %}
    {%- else %}
        {% for localip in localips %}
            {% if ':' in localip %}
                bind quic6@{{localip}}:443 ssl {% if ssl_crt_path %}crt {{ssl_crt_path}}{% endif %}
            {% else %}
                bind quic4@{{localip}}:443 ssl {% if ssl_crt_path %}crt {{ssl_crt_path}}{% endif %}
            {% endif %}
        {% endfor %}
    {%- endif %}
    {%- for name, svc in http3_services.group_by("name").items() %}
        {%- for routetype in svc.tagvalue_set("smartstack:routing:") %}
            {%- if routetype == "hostname" %}
                {%- for hostname in svc.tagvalue_set("smartstack:hostname:") %}
                    acl host_{{name}} hdr(host) -i {{hostname}}
                {%- endfor %}
            {%- elif routetype == "port" %}
                {%- for ports in svc.tagvalue_set("smartstack:extport:") %}
                    {%- if '-' in ports %}
                         acl host_{{name}} fc_dst_port {{ports|replace('-', ':')}}
                    {%- else %}
                        acl host_{{name}} fc_dst_port eq {{ports}}
                    {%- endif %}
                {%- endfor %}
            {%- endif %}
        {%- else %}
            {%- for hostname in svc.tagvalue_set("smartstack:hostname:") %}
                acl host_{{name}} hdr(host) -i {{hostname}}
            {%- endfor %}
        {%- endfor %}
        {%- for option in svc.tagvalue_set("haproxy:frontend:option:") %}
            option {{option}}
        {% endfor %}
        {%- for ports in svc.tagvalue_set("smartstack:extport:") %}
            {%- if '-' in ports %}
                use_backend backend-http3-{{name}}_{{ports}} if host_{{name}}
            {%- else %}
                use_backend backend-http3-{{name}} if host_{{name}}
            {%- endif %}
        {%- else %}
            use_backend backend-http3-{{name}} if host_{{name}}
        {%- endfor %}
    {%- endfor %}
{%- endif %}


{%- macro backend(prot, name, svc, portrange='') %}
backend backend-{{prot}}-{{name}}{% if portrange %}_{{portrange}}{% endif %}
        {%- for backend in svc %}
            {%- if portrange %}
                server {{name}}-{{prot}}_{{portrange}}-srv{{loop.index}} {{backend.ip}} check port {{backend.port}}{% if backend.tagvalue("haproxy:backend:server-extra:") %} {{backend.tagvalue("haproxy:backend:server-extra:")}}{% endif %}
            {%- else %}
                server {{name}}-{{prot}}-srv{{loop.index}} {{backend.ip}}:{{backend.port}} check{% if backend.tagvalue("haproxy:backend:server-extra:") %} {{backend.tagvalue("haproxy:backend:server-extra:")}}{% endif %}
            {%- endif %}
        {%- endfor %}
        mode {% if prot.startswith("http") %}http{% else %}tcp{% endif %}
        {%- for option in svc.tagvalue_set("haproxy:backend:option:") %}
            option {{option}}
        {%- endfor %}
        {%- if svc[0].tagvalue("haproxy:backend:timeout:") %}
            timeout {{timeout.split(':', 1)[0]}} {{timeout.split(':', 1)[1]}}
        {%- endif %}
        {%- if prot.startswith("http") and not svc[0].tagvalue("haproxy:no-forward-for") %}
            option forwardfor
        {%- endif %}
        {%- if "hsts-enabled" in svc[0].tagvalue_set("smartstack:") %}
            # HSTS (15768000 seconds == 6 months)
            http-response set-header Strict-Transport-Security max-age=15768000
        {%- endif %}
{% endmacro %}


{%- for prot, servicegroup in (sni_services + http3_services + https_services + tcp_services).group_by_tagvalue("smartstack:protocol:").items() %}
    {%- for name, svc in servicegroup.group_by("name").items() %}
        {%- for portrange in svc.tagvalue_set("smartstack:extport:") %}
            {%- if '-' in portrange %}
                 {{ backend(prot, name, svc, portrange) }}
            {%- else %}
                {{ backend(prot, name, svc) }}
            {%- endif %}
        {%- else %}
             {{ backend(prot, name, svc) }}
        {%- endfor %}
    {%- endfor %}
{%- endfor %}
