# smtpd.conf for the maurus.networks email config


### set up the selected certificates
pki {{receiver_hostname}} cert "{{receiver_certfile|trim}}"
pki {{receiver_hostname}} key "{{receiver_keyfile|trim}}"
pki {{relay_hostname}} cert "{{relay_certfile|trim}}"
pki {{relay_hostname}} key "{{relay_keyfile|trim}}"
pki {{internal_relay_hostname}} cert "{{internal_relay_certificate|trim}}"
pki {{internal_relay_hostname}} key "{{internal_relay_keyfile|trim}}"


### define our filters
filter "greylistd" proc-exec "/usr/lib/x86_64-linux-gnu/opensmtpd/filter-greylistd"
filter "dnsbl" proc-exec "/usr/lib/x86_64-linux-gnu/opensmtpd/filter-dnsbl zen.spamhaus.org"
filter "denyrelay" proc-exec "/usr/lib/x86_64-linux-gnu/opensmtpd/filter-denyrelay /etc/smtpd/denyrelay.conf"
filter "fail2banlog" proc-exec "/usr/lib/x86_64-linux-gnu/opensmtpd/filter-fail2banlog"

### define built-in filters
filter "fcrdns" phase connect match !fcrdns \
    disconnect "550 sorry, we require forward-confirmed reverse DNS for SMTP connections"

### set the filter chain for incoming mail on the receiver
filter "f_incoming" chain {"fcrdns", "fail2banlog", "greylistd", "dnsbl"}
filter "f_outgoing" chain {"denyrelay", "fail2banlog"}


### load valid domains and users which we accept mail for from PostgreSQL
table validdomains postgres:/etc/smtpd/postgresql.table.conf
table validrecipients postgres:/etc/smtpd/postgresql.table.conf
table credentials postgres:/etc/smtpd/postgresql.table.conf


### receive email from the internet (i.e. unauthenticated users) who may or may not use TLS
{%- for receiver_ip in receiver_ips %}{% if receiver_ip %}
listen on "{{receiver_ip}}" port 25 tls pki "{{receiver_hostname}}" \
    hostname "{{receiver_hostname}}" tag UNFILTERED filter f_incoming
listen on "{{receiver_ip}}" port 465 smtps pki "{{receiver_hostname}}" \
    hostname "{{receiver_hostname}}" tag UNFILTERED filter f_incoming
{% endif %}{%- endfor %}

### incoming email for external authenticated users who must use TLS
{%- for relay_ip in relay_ips %}{% if relay_ip %}
listen on "{{relay_ip}}" port 465 smtps auth <credentials> \
    pki "{{relay_hostname}}" hostname "{{relay_hostname}}" \
    tag AUTHENTICATED filter f_outgoing
{% endif %}{%- endfor %}

### incoming email for internal applications
{%- for internal_relay_ip in internal_relay_ips %}{% if internal_relay_ip %}
listen on "{{internal_relay_ip}}" port 25 tls pki \
    "{{internal_relay_hostname}}" hostname "{{internal_relay_hostname}}" \
    tag INTERNAL
{% endif %}{%- endfor %}

### Reject anything on an invalid domain.
match tag UNFILTERED from any ! for domain <validdomains> reject


### incoming email with a valid recipient, but tagged as UNFILTERED goes to
### amavisd-new on port 10026 and comes back on port 10025 AS FILTERED
action amavisd relay host "lmtp://localhost:10026"
match tag UNFILTERED from any for domain <validdomains> \
    rcpt-to <validrecipients> action amavisd
listen on localhost port 10025 tag FILTERED


### relay mail from authenticated users goes to
###     -> mailforwarder for local recipients
###     -> dkimsign for remote recipients
action mailforwarder relay host "smtp://localhost:10046"
action dkimsign relay host "smtp://localhost:10036"
match tag AUTHENTICATED from any \
    for domain <validdomains> rcpt-to <validrecipients> \
    action mailforwarder
match tag AUTHENTICATED from any for any action mailforwarder


### relay mail for server-network services. This is submitted through Smartstack by other
### daemons in the network and goes to
###     -> mailforwarder for local recipients
###     -> dkimsign for remote recipients
match tag INTERNAL from any \
    for domain <validdomains> rcpt-to <validrecipients> \
    action mailforwarder
match tag INTERNAL from any for any action mailforwarder


### incoming email that went through amavisd next goes to mailforwarder for
### mailing list/alias processing. When it comes back, aliases have been
### removed from the RCPT TO list. Everything tagged FILTERED has already
### validated recipients.
match tag FILTERED from local for any action mailforwarder

### mailforwarder returns mail from domains marked
### `can_use_transactional_relay` to port 10047 and everything else to
### port 10045
listen on localhost port 10045 tag FORWARDER_PROCESSED
{%- if enable_transactional_relay %}
listen on localhost port 10047 tag FORWARDER_TRANSACTIONAL
{%- endif %}

### mailforwarder might forward emails to external addresses. Then they must be
### DKIM signed at which point the SIGNED rule will process them below.
### `for any recipient` would not deny invalid addresses, so the rule below will only
### match remote recipients, sign their email, and follow through to the delivery rule below.
### This rule would basically accept *all* mail, so we limit it to localhost so we don't
### create an open relay.
match tag FORWARDER_PROCESSED from local \
    for any ! rcpt-to <validrecipients> action dkimsign

{%- if enable_transactional_relay %}
action dkimsign_transactional relay host "smtp://localhost:10038"
match tag FORWARDER_TRANSACTIONAL from local \
    for any ! rcpt-to <validrecipients> action dkimsign_transactional
{%- endif %}

### deliver remote incoming mail that has been filtered by amavisd or processed
### by the mailforwarder daemon for local recipients. The matching of validdomains
### and validrecipients is redundant as all remote mail has been matched above.
action deliver_into_maildir mda \
    "/usr/lib/dovecot/dovecot-lda -f %{sender} -d %{rcpt}" user virtmail \
    virtual <validrecipients>
match tag FORWARDER_PROCESSED from local \
    for domain <validdomains> rcpt-to <validrecipients> action deliver_into_maildir
match tag FORWARDER_TRANSACTIONAL from local \
    for domain <validdomains> rcpt-to <validrecipients> action deliver_into_maildir


### mail coming back from DKIM signing, goes out to the world
listen on localhost port 10035 tag DKIMSIGNED

{%- if enable_transactional_relay %}
listen on localhost port 10037 tag DKIMSIGNED_TRANSACTIONAL
{%- endif %}

action yeet relay{% if relay_via_url is defined %} host {{relay_via_url}}{% endif %}
    {%- if relay_via_auth is defined %} auth {{'{'}} {{relay_via_auth}} {{'}'}}{% endif %}
match tag DKIMSIGNED from local for any action yeet

{%- if enable_transactional_relay %}
action yeet_via_relay relay {% if txrelay_via_url is defined %}host {{txrelay_via_url}}{% endif %}
    {%- if txrelay_via_auth is defined %} auth {{'{'}} {{txrelay_via_auth}} {{'}'}}{% endif %}
match tag DKIMSIGNED_TRANSACTIONAL from local for any action yeet_via_relay
{%- endif %}

### allow the mail node itself to relay mail via sendmail
match from local for any action mailforwarder

### if none of the above rules match, the default behavior is to reject, which is fine.
### EOF
